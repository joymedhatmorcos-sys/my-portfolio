<!DOCTYPE html>
<html>
<head>
    <title>Joy Studio | Portfolio</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            text-align: center; 
            padding: 50px 20px;
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            display: inline-block; 
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { 
            color: #222; 
            margin-bottom: 5px;
            font-size: 2.5rem;
        }
        p { 
            color: #666; 
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .gallery img { 
            width: 100%; 
            height: auto; 
            border-radius: 12px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Joy Studio</h1>
        <p>Student & Digital Designer</p>
        
        <div class="gallery">
             <img src="boat.jpg" alt="Sunset Boat">
        </div>
    </div>

</body>
</html>
